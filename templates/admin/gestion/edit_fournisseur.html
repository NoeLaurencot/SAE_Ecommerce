{% extends 'layout.html' %}

{% block title %}
<title>Modifier un fournisseur</title>
{% endblock %}

{% block body %}
<main class="crud-container">
    <h2>Modifier un fournisseur</h2>
    <form class="crud-input-list" method="post" action="/admin/fournisseur/edit">
        <input type="hidden" value="{{ fournisseur.id_fournisseur }}" name="id">
        <div class="crud-field">
            <label for="libelle">Libellé</label>
            <input id="libelle" name="libelle" type="text" value="{{ fournisseur.libelle_fournisseur }}" required>
        </div>
        <div class="crud-field-actions">
            <button class="validate-button-black" type="submit">Modifier</button>
            <a class="validate-button-white-outline" href="/admin/fournisseur/show" role="button">Retour</a>
        </div>
    </form>
</main>
{% endblock %}
