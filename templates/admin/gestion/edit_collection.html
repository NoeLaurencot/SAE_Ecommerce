{% extends 'layout.html' %}

{% block title %}
<title>Modifier une collection</title>
{% endblock %}

{% block body %}
<main class="crud-container">
    <h2>Modifier une collection</h2>
    <form class="crud-input-list" method="post" action="/admin/collection/edit">
        <input type="hidden" value="{{ collection.id_collection }}" name="id">
        <div class="crud-field">
            <label for="libelle">Libellé</label>
            <input id="libelle" name="libelle" type="text" value="{{ collection.libelle_collection }}" required>
        </div>
        <div class="crud-field-actions">
            <button class="validate-button-black" type="submit">Modifier</button>
            <a class="validate-button-white-outline" href="/admin/collection/show" role="button">Retour</a>
        </div>
    </form>
</main>
{% endblock %}
